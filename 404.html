<!DOCTYPE html>
<html lang="pt-BR">

    <meta
      name="description"
      content="A página que você tentou acessar não existe ou mudou de endereço."
    />
    <meta name="robots" content="noindex,follow" />
    <meta name="theme-color" content="#05080c" />
    <link rel="icon" type="image/png" sizes="256x256" href="/assets/favicon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

      <main class="briefing-hero">
        <div class="container briefing-hero-grid">

              Esta página não está mais aqui.
              <span>Vamos te levar de volta para a Agência Winc.</span>
            </h1>

              O endereço pode ter mudado, sido removido ou digitado de forma incorreta.
              Você pode voltar para a home ou abrir o WhatsApp e falar com a equipe.
            </p>
            <div class="hero-actions">
              <a class="button button-primary" href="/">Ir para a home</a>
              <a
                class="button button-secondary"
                href="https://wa.me/558291875154"
                target="_blank"
                rel="noopener noreferrer"

                Falar no WhatsApp

          </div>
